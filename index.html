<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Superstore Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<style>
:root {
  --bg:#0b1220; --panel:#0f1a2b; --panel2:#0c1626;
  --text:#e6edf3; --muted:#9aa4b2; --grid:rgba(255,255,255,0.08);
}
*{box-sizing:border-box;}
body{
margin:0;
background: radial-gradient(1200px 600px at 20% -10%, rgba(124,58,237,0.20), transparent 55%),
            radial-gradient(1000px 600px at 110% 20%, rgba(6,182,212,0.18), transparent 55%),
            var(--bg);
color:var(--text);
font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;}
.wrap{max-width:1280px;margin:0 auto;padding:16px 14px 22px;}
.header{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;flex-wrap:wrap;}
.title{font-size:16px;font-weight:800;letter-spacing:.2px;}
.sub{font-size:12px;color:var(--muted);margin-top:2px;}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:end;justify-content:flex-end;}
.f{background:var(--panel);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:8px 10px;min-width:170px;}
label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;}
select,input{width:100%;background:var(--panel2);color:var(--text);border:1px solid rgba(255,255,255,0.10);
border-radius:8px;padding:8px 10px;outline:none;font-size:12px;}
.btn{cursor:pointer;background:var(--panel);border:1px solid rgba(255,255,255,0.10);color:var(--text);
border-radius:10px;padding:10px 12px;font-size:12px;font-weight:700;}
.btn:hover{border-color: rgba(255,255,255,0.18);}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:12px 0 10px;}
.card{background:var(--panel);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px 12px;min-height:64px;}
.kpi-name{font-size:11px;color:var(--muted);margin-bottom:6px;}
.kpi-val{font-size:16px;font-weight:900;letter-spacing:.2px;}
.grid{display:grid;grid-template-columns:1.25fr 0.75fr;gap:10px;margin-top:10px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.grid3{display:grid;grid-template-columns:0.9fr 1.1fr;gap:10px;margin-top:10px;}
.plot{background:var(--panel);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:6px;}
.note{margin-top:10px;color:var(--muted);font-size:11px;}
@media (max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr);}.grid,.grid2,.grid3{grid-template-columns:1fr;}}
</style></head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="title">Global Superstore — Sales Dashboard</div>
      <div class="sub">KPIs • Filters • 7‑Day Forecast</div>
    </div>
    <div class="filters">
      <div class="f"><label>Country</label><select id="country"></select></div>
      <div class="f"><label>Region</label><select id="region"></select></div>
      <div class="f"><label>Category</label><select id="category"></select></div>
      <div class="f"><label>Start date</label><input id="start" type="date" value="2015-01-03"/></div>
      <div class="f"><label>End date</label><input id="end" type="date" value="2018-12-30"/></div>
      <button class="btn" id="apply">Apply</button>
    </div>
  </div>

  <div class="kpis">
    <div class="card"><div class="kpi-name">Total Sales</div><div class="kpi-val" id="kpi_sales"></div></div>
    <div class="card"><div class="kpi-name">Orders</div><div class="kpi-val" id="kpi_orders"></div></div>
    <div class="card"><div class="kpi-name">AOV</div><div class="kpi-val" id="kpi_aov"></div></div>
    <div class="card"><div class="kpi-name">Active Customers</div><div class="kpi-val" id="kpi_customers"></div></div>
    <div class="card"><div class="kpi-name">Avg Daily Sales</div><div class="kpi-val" id="kpi_avg"></div></div>
  </div>

  <div class="grid">
    <div class="plot"><div id="plot_daily" style="height:360px;"></div></div>
    <div class="plot"><div id="plot_cat" style="height:360px;"></div></div>
  </div>

  <div class="grid3">
    <div class="plot"><div id="plot_reg" style="height:340px;"></div></div>
    <div class="plot"><div id="plot_heat" style="height:340px;"></div></div>
  </div>

  <div class="grid2">
    <div class="plot"><div id="plot_fc" style="height:340px;"></div></div>
    <div class="plot"><div id="plot_table" style="height:340px;"></div></div>
  </div>

  <div class="note">Filters update KPIs and all charts except the Forecast (global by design). The table shows top 10 days by sales under current filters.</div>
</div>

const config = {displayModeBar:false, responsive:true};

function fmtMoney(x) {
  if (!isFinite(x)) return "0.00";
  return x.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtInt(x) {
  if (!isFinite(x)) return "0";
  return Math.round(x).toLocaleString();
}

function setKPIs(k) {
  document.getElementById("kpi_sales").innerText = fmtMoney(k.Sales);
  document.getElementById("kpi_orders").innerText = fmtInt(k.Orders);
  document.getElementById("kpi_aov").innerText = fmtMoney(k.AOV);
  document.getElementById("kpi_customers").innerText = fmtInt(k.Customers);
  document.getElementById("kpi_avg").innerText = fmtMoney(k.AvgDailySales);
}

function initSelect(id, arr, defaultVal="All") {
  const sel = document.getElementById(id);
  arr.forEach(v => {
    const opt=document.createElement("option");
    opt.value=v; opt.textContent=v;
    sel.appendChild(opt);
  });
  sel.value = defaultVal;
}

function filterRows(country, region, category, start, end) {
  return DATA.filter(r => {
    const okC = (country==="All") ? true : (r.Country===country);
    const okR = (region==="All") ? true : (r.Region===region);
    const okCat = (category==="All") ? true : (r.Category===category);
    const okD = (r.Date >= start && r.Date <= end);
    return okC && okR && okCat && okD;
  });
}

function aggKPIs(rows) {
  let sales=0, orders=0;
  let dates=new Set();
  let maxCustomers=0;
  for (const r of rows) {
    sales += r.Sales;
    orders += r.Orders;
    dates.add(r.Date);
    if (r.Customers>maxCustomers) maxCustomers=r.Customers;
  }
  const aov = orders>0 ? sales/orders : 0;
  const avg = dates.size>0 ? sales/dates.size : 0;
  return {Sales:sales, Orders:orders, AOV:aov, Customers:maxCustomers, AvgDailySales:avg};
}

function dailySeries(rows) {
  const m=new Map();
  for (const r of rows) m.set(r.Date, (m.get(r.Date)||0) + r.Sales);
  const dates=Array.from(m.keys()).sort();
  const vals=dates.map(d=>m.get(d));
  return {dates, vals};
}

function topByKey(rows, key, n=10) {
  const m=new Map();
  for (const r of rows) m.set(r[key], (m.get(r[key])||0) + r.Sales);
  const items=Array.from(m.entries()).sort((a,b)=>b[1]-a[1]).slice(0,n);
  return {x:items.map(i=>i[0]), y:items.map(i=>i[1])};
}

function heatmapDowMonth(rows) {
  const z=[...Array(7)].map(()=>Array(12).fill(0));
  for (const r of rows) {
    const d=new Date(r.Date+"T00:00:00");
    const dow=(d.getDay()+6)%7;
    const month=d.getMonth();
    z[dow][month]+=r.Sales;
  }
  return {z:z, x:[...Array(12)].map((_,i)=>String(i+1)), y:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]};
}

function topDaysTable(rows) {
  const m=new Map();
  for (const r of rows) m.set(r.Date, (m.get(r.Date)||0) + r.Sales);
  const items=Array.from(m.entries()).sort((a,b)=>b[1]-a[1]).slice(0,10);
  return {dates:items.map(i=>i[0]), sales:items.map(i=>i[1])};
}

function renderInitial() {
  Plotly.newPlot("plot_daily", FIG_DAILY.data, FIG_DAILY.layout, config);
  Plotly.newPlot("plot_cat", FIG_CAT.data, FIG_CAT.layout, config);
  Plotly.newPlot("plot_reg", FIG_REG.data, FIG_REG.layout, config);
  Plotly.newPlot("plot_heat", FIG_HEAT.data, FIG_HEAT.layout, config);
  Plotly.newPlot("plot_fc", FIG_FC.data, FIG_FC.layout, config);

  Plotly.newPlot("plot_table",
    [{type:"table",
      header:{
        values:["Date","Sales"],
        align:"left",
        fill:{color:"#0c1626"},
        line:{color:"rgba(255,255,255,0.10)"},
        font:{color:"#e6edf3", size:12}
      },
      cells:{
        values:[[],[]],
        align:"left",
        fill:{color:"#0f1a2b"},
        line:{color:"rgba(255,255,255,0.08)"},
        font:{color:"#e6edf3", size:12},
        height:24
      }
    }],
    TABLE_LAYOUT,
    config
  );

  setKPIs(KPI_DEFAULTS);
}

function applyFilters() {
  const country=document.getElementById("country").value;
  const region=document.getElementById("region").value;
  const category=document.getElementById("category").value;
  const start=document.getElementById("start").value;
  const end=document.getElementById("end").value;

  const rows=filterRows(country, region, category, start, end);

  const k=aggKPIs(rows);
  setKPIs(k);

  const s=dailySeries(rows);
  Plotly.react("plot_daily", [{type:"scatter", mode:"lines", name:"Sales", x:s.dates, y:s.vals}], FIG_DAILY.layout, config);

  const tc=topByKey(rows,"Category",10);
  Plotly.react("plot_cat", [{type:"bar", name:"Sales", x:tc.x, y:tc.y}], FIG_CAT.layout, config);

  const tr=topByKey(rows,"Region",10);
  Plotly.react("plot_reg", [{type:"bar", name:"Sales", x:tr.x, y:tr.y}], FIG_REG.layout, config);

  const hm=heatmapDowMonth(rows);
  Plotly.react("plot_heat", [{type:"heatmap", z:hm.z, x:hm.x, y:hm.y}], FIG_HEAT.layout, config);

  const t=topDaysTable(rows);
  Plotly.react("plot_table",
    [{type:"table",
      header:{
        values:["Date","Sales"],
        align:"left",
        fill:{color:"#0c1626"},
        line:{color:"rgba(255,255,255,0.10)"},
        font:{color:"#e6edf3", size:12}
      },
      cells:{
        values:[t.dates, t.sales.map(v=>fmtMoney(v))],
        align:"left",
        fill:{color:"#0f1a2b"},
        line:{color:"rgba(255,255,255,0.08)"},
        font:{color:"#e6edf3", size:12},
        height:24
      }
    }],
    TABLE_LAYOUT,
    config
  );
}

initSelect("country", COUNTRIES, "All");
initSelect("region", REGIONS, "All");
initSelect("category", CATEGORIES, "All");
renderInitial();
document.getElementById("apply").addEventListener("click", applyFilters);
</script>
