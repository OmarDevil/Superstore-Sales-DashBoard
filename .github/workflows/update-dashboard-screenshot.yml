name: Update Dashboard Screenshot

on:
  workflow_dispatch:
  push:
    paths:
      - index.html
      - .github/workflows/update-dashboard-screenshot.yml

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Capture dashboard screenshot
        run: |
          mkdir -p images
          cat > capture.js <<'EOF'
          const { chromium } = require('playwright');
          const path = require('path');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1280, height: 900 }, deviceScaleFactor: 1 });
            await page.goto('file://' + path.resolve('index.html'), { waitUntil: 'networkidle', timeout: 120000 });
            await page.waitForFunction(() => {
              const sales = document.querySelector('#kpi_sales');
              const chart = document.querySelector('#plot_daily .main-svg');
              return sales && sales.textContent.trim().length > 0 && chart;
            }, { timeout: 120000 });
            await page.waitForTimeout(2500);
            await page.screenshot({ path: 'images/dashboard-screenshot.png', fullPage: true });
            await browser.close();
          })();
          EOF
          node capture.js

      - name: Commit screenshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/dashboard-screenshot.png
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "Update real dashboard screenshot"
            git push
          fi
